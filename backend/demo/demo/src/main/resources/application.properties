spring.application.name=demo

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/crypto_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate dialect not needed in Spring Boot 3.x (auto-detected)
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA/Hibernate Configuration
# 'update' automatically creates/updates tables based on entities (development mode)
spring.jpa.hibernate.ddl-auto=update

# SQL Logging Configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ETL Pipeline Configuration
etl.python.command=python
etl.script.path=C:/Users/User/PycharmProjects/das-project/Domasna4/crypto_etl/main.py
etl.working.directory=C:/Users/User/PycharmProjects/das-project/Domasna4/crypto_etl

# Microservices Configuration
# URLs can be overridden via environment variables
microservices.technical-analysis.url=${MICROSERVICES_TECHNICAL_ANALYSIS_URL:http://localhost:8001}
microservices.lstm-prediction.url=${MICROSERVICES_LSTM_PREDICTION_URL:http://localhost:8002}
microservices.onchain-sentiment.url=${MICROSERVICES_ONCHAIN_SENTIMENT_URL:http://localhost:8003}
microservices.data-ingestion.url=${MICROSERVICES_DATA_INGESTION_URL:http://localhost:8000}

# Timeout settings (milliseconds)
microservices.timeout.connect=5000
microservices.timeout.read=30000